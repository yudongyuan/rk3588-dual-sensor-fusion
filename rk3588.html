<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Thermal Stream</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background-color: #f5f5f5;
      font-family: Arial, sans-serif;
    }

    h2 {
      margin-bottom: 20px;
    }

    img {
      border: 2px solid #ccc;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .buttons {
      margin-top: 20px;
    }

    button {
      margin: 0 10px;
      padding: 8px 16px;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <h2>双光融合图像流</h2>
  <img id="stream" style="width:640px; height:auto;" />

  <div class="buttons">
    <button onclick="sendCommand('toggle_yolo')">YOLO 开关</button>
    <button onclick="sendCommand('toggle_edge')">边缘强化</button>
    <button onclick="sendCommand('colormap_next')">切换色彩映射</button>
  </div>

  <script>
    const ws = new WebSocket("ws://192.168.137.2:9002");

    ws.onopen = () => {
      console.log("WebSocket 连接已建立");
    };

    ws.onmessage = function(evt) {
      document.getElementById("stream").src = "data:image/jpeg;base64," + evt.data;
    };

    ws.onerror = function(err) {
      console.error("WebSocket 错误: ", err);
    };

    function sendCommand(cmd) {
      if (ws.readyState === WebSocket.OPEN) {
        ws.send(cmd);
      } else {
        console.warn("WebSocket 未连接，无法发送命令");
      }
    }
  </script>
</body>

</html>
